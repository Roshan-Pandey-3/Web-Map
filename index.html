<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WRC Amenities Map – Representative Icons from Excel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- SheetJS for reading Excel files -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; }
        #map { height: 100%; width: 100%; z-index: 1; }
        .info-panel {
            position: absolute;
            bottom: 30px;
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            color: white;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 4px solid #ff9800;
            max-width: 300px;
        }
        .info-panel strong { color: #ffaa66; }
        .control-bar {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
            padding: 12px;
            min-width: 210px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(4px);
            font-size: 13px;
        }
        .file-input-wrapper {
            margin-bottom: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .file-input-wrapper input { flex: 1; font-size: 12px; }
        .control-bar select, .control-bar button {
            width: 100%;
            margin-top: 8px;
            padding: 6px 10px;
            border-radius: 30px;
            border: 1px solid #ccc;
            background: #f9f9f9;
            font-weight: 500;
            cursor: pointer;
        }
        .control-bar button { background: #2c3e66; color: white; border: none; }
        .control-bar button:hover { background: #1e2b48; }
        .buffer-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .buffer-btn {
            flex: 1;
            text-align: center;
            background: #4a6a8b;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 0;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .buffer-btn.active { background: #e67e22; }
        .buffer-btn:hover { background: #2c3e66; }
        .legend {
            background: rgba(255,255,240,0.92);
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 12px;
            line-height: 1.6;
            max-height: 60vh;
            overflow-y: auto;
        }
        .legend i { width: 20px; display: inline-block; text-align: center; margin-right: 6px; font-size: 14px; }
        .leaflet-popup-content { font-size: 13px; min-width: 180px; }
        .hover-tooltip-custom { font-weight: bold; background: #222; color: #fff; border-radius: 4px; padding: 4px 8px; }
        @media (max-width: 600px) {
            .control-bar { top: 10px; right: 8px; min-width: 180px; padding: 8px; }
            .info-panel { font-size: 11px; bottom: 15px; left: 8px; max-width: 240px; }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info-panel" id="hoverInfoPanel">
        🧭 <strong>Hover over any amenity</strong><br>
        <span id="hoverDetails">Load an Excel file to see amenities with icons</span>
    </div>
    <div class="control-bar">
        <div class="file-input-wrapper">
            <input type="file" id="excelInput" accept=".xls, .xlsx, .csv">
            <button id="loadBtn">📂 Load & Map</button>
        </div>
        <button id="resetViewBtn">⟳ Reset view & clear buffer</button>
        <div style="margin-top: 8px; font-size: 12px; font-weight: bold;">📍 Buffer radius:</div>
        <div class="buffer-buttons">
            <button data-radius="200" class="buffer-btn">200m</button>
            <button data-radius="500" class="buffer-btn">500m</button>
            <button data-radius="1000" class="buffer-btn">1km</button>
            <button data-radius="2000" class="buffer-btn">2km</button>
        </div>
        <select id="filterTypeSelect">
            <option value="all">📌 All amenity types</option>
        </select>
        <button id="showNearbyBtn">📍 List within current buffer</button>
    </div>

    <script>
        const WRC_CENTER = [28.2565, 83.9777];
        let map = null;
        let allMarkers = [];
        let currentBufferCircle = null;
        let currentBufferRadius = null;
        let amenitiesData = [];      // will be filled from Excel

        // Mapping of amenity type -> Font Awesome icon (solid or regular)
        const iconMap = {
            "Grocery": "fa-store",               // 🛒
            "Restaurant and cafe": "fa-utensils", // 🍽️
            "Recreational area": "fa-tree",       // 🌲 / park
            "Health facility": "fa-hospital",     // 🏥
            "Bank": "fa-landmark",                // 🏦
            "ATM": "fa-money-bill-wave",          // 💵
            "Stationery": "fa-pen-ruler",         // ✏️
            "Barber Shop": "fa-cut",              // ✂️
            "Tailor": "fa-scissors",              // ✂️ (different)
            "GYM": "fa-dumbbell",                 // 💪
            "Driving School": "fa-car",           // 🚗
            "Hostel": "fa-bed",                   // 🛏️
            "Hostels": "fa-bed",
            "Other": "fa-location-dot"
        };

        // Background colors for each type (soft, but icon stands out)
        const bgColors = {
            "Grocery": "#4CAF50", "Restaurant and cafe": "#FF5722", "Recreational area": "#2196F3",
            "Health facility": "#E91E63", "Bank": "#9C27B0", "ATM": "#FF9800", "Stationery": "#00BCD4",
            "Barber Shop": "#795548", "Tailor": "#607D8B", "GYM": "#3F51B5", "Driving School": "#FFEB3B",
            "Hostel": "#8BC34A", "Hostels": "#8BC34A", "Other": "#AAAAAA"
        };

        function initMap() {
            if (map) return;
            map = L.map('map').setView(WRC_CENTER, 15.5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
            L.control.scale({ metric: true, imperial: false }).addTo(map);
            // Legend with icons
            const legend = L.control({ position: 'bottomright' });
            legend.onAdd = function () {
                const div = L.DomUtil.create('div', 'legend');
                div.innerHTML = '<strong>🏷️ Amenity Types</strong><br>';
                for (let [type, color] of Object.entries(bgColors)) {
                    if (type === "Other") continue;
                    const iconClass = iconMap[type] || "fa-location-dot";
                    div.innerHTML += `<i class="fas ${iconClass}" style="color:${color};"></i> ${type}<br>`;
                }
                div.innerHTML += `<hr><span style="font-size:10px;">🖱️ Hover = distance<br>🔍 Click for details</span>`;
                return div;
            };
            legend.addTo(map);
            // WRC marker as a distinct icon
            L.marker(WRC_CENTER, { 
                icon: L.divIcon({ 
                    html: '<i class="fas fa-university" style="font-size:24px; color:#2c3e66; text-shadow: 0 0 2px white;"></i>', 
                    iconSize: [30, 30], 
                    className: 'wrc-icon' 
                }), 
                zIndexOffset: 1000 
            }).addTo(map).bindTooltip('🎓 WRC Campus').openTooltip();
        }

        function getMarkerIcon(type) {
            const iconName = iconMap[type] || "fa-location-dot";
            const bgColor = bgColors[type] || "#AAAAAA";
            // Create a stylish marker with white circle background and colored icon
            const html = `
                <div style="
                    background-color: white;
                    width: 32px;
                    height: 32px;
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
                    border: 2px solid ${bgColor};
                ">
                    <i class="fas ${iconName}" style="color: ${bgColor}; font-size: 16px;"></i>
                </div>
            `;
            return L.divIcon({
                html: html,
                iconSize: [32, 32],
                iconAnchor: [16, 32],
                popupAnchor: [0, -20],
                className: 'custom-icon'
            });
        }

        function renderMap(filterType = "all") {
            if (!map) initMap();
            allMarkers.forEach(m => map.removeLayer(m));
            allMarkers = [];

            amenitiesData.forEach(item => {
                if (filterType !== "all" && item.type !== filterType) return;
                const icon = getMarkerIcon(item.type);
                const marker = L.marker([item.lat, item.lng], { icon: icon });
                const distText = item.distance !== undefined ? item.distance.toFixed(1) : '?';
                marker.bindTooltip(`<b>${item.name}</b><br>${item.type} | ${distText}m from WRC`, {
                    sticky: true, className: "hover-tooltip-custom", offset: [10, -10]
                });
                let popupHtml = `<div style="font-size:13px;"><b>🏪 ${item.name}</b><br>📌 Type: ${item.type}<br>📍 Area: ${item.area || 'N/A'}<br>📏 Distance: ${distText} m`;
                if (item.subCat) popupHtml += `<br>🔖 ${item.subCat}`;
                popupHtml += `</div>`;
                marker.bindPopup(popupHtml);
                marker.on('mouseover', () => {
                    document.getElementById('hoverDetails').innerHTML = `<span style="color:#FFB347;">✨ ${item.name}</span> (${item.type}) — ${distText}m from WRC<br><span style="font-size:11px;">📌 ${item.area || 'Unknown area'}</span>`;
                });
                marker.on('mouseout', () => {
                    document.getElementById('hoverDetails').innerHTML = `Name, type & accurate distance from Excel — hover any icon`;
                });
                marker.addTo(map);
                allMarkers.push(marker);
            });
            if (allMarkers.length) {
                const group = L.featureGroup(allMarkers);
                map.fitBounds(group.getBounds().pad(0.2));
            }
        }

        function drawBuffer(radiusMeters) {
            if (!map) return;
            if (currentBufferCircle) map.removeLayer(currentBufferCircle);
            if (radiusMeters && radiusMeters > 0) {
                currentBufferCircle = L.circle(WRC_CENTER, {
                    radius: radiusMeters,
                    color: '#e34234', weight: 2.5, fillColor: '#ff6347', fillOpacity: 0.1, dashArray: '6, 8'
                }).addTo(map).bindTooltip(`📐 ${radiusMeters}m service radius`, { sticky: true });
                currentBufferRadius = radiusMeters;
            } else {
                currentBufferCircle = null;
                currentBufferRadius = null;
            }
        }

        function updateFilterDropdown() {
            const select = document.getElementById('filterTypeSelect');
            select.innerHTML = '<option value="all">📌 All amenity types</option>';
            const types = [...new Set(amenitiesData.map(d => d.type))].sort();
            types.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                select.appendChild(opt);
            });
        }

        // Parse Excel and extract amenities
        function parseExcelAndMap(data) {
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            if (!rows || rows.length < 2) throw new Error("No data found");
            const headers = rows[0].map(h => String(h || "").trim());
            // Find column indices (case-insensitive partial match)
            const colIndex = (keywords) => {
                for (let i = 0; i < headers.length; i++) {
                    const h = headers[i].toLowerCase();
                    if (keywords.some(kw => h.includes(kw))) return i;
                }
                return -1;
            };
            const nameCol = colIndex(["name_of_am", "amenity name", "name"]);
            const typeCol = colIndex(["amenity_ty", "amenity type", "type"]);
            const latCol = colIndex(["_location_o_latitude", "latitude", "lat"]);
            const lngCol = colIndex(["_locatio_1", "longitude", "lon", "long"]);
            const distCol = colIndex(["distance_from_wrc", "distance_1", "distance"]);
            const areaCol = colIndex(["area_name", "area"]);
            const subCatCol = colIndex(["sub_catego", "sub_category", "sub_cat"]);
            if (nameCol === -1 || latCol === -1 || lngCol === -1) {
                alert("Could not find required columns (name, latitude, longitude). Check file headers.");
                return;
            }
            const amenities = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;
                const name = row[nameCol] ? String(row[nameCol]).trim() : "";
                if (!name) continue;
                let lat = parseFloat(row[latCol]);
                let lng = parseFloat(row[lngCol]);
                if (isNaN(lat) || isNaN(lng)) continue;
                let type = typeCol !== -1 ? String(row[typeCol] || "Other").trim() : "Other";
                let distance = distCol !== -1 ? parseFloat(row[distCol]) : NaN;
                if (isNaN(distance)) distance = 0;
                let area = areaCol !== -1 ? String(row[areaCol] || "").trim() : "";
                let subCat = subCatCol !== -1 ? String(row[subCatCol] || "").trim() : "";
                amenities.push({ name, type, lat, lng, distance, area, subCat });
            }
            if (amenities.length === 0) throw new Error("No valid amenities found");
            amenitiesData = amenities;
            updateFilterDropdown();
            renderMap("all");
            if (currentBufferCircle) map.removeLayer(currentBufferCircle);
            currentBufferCircle = null;
            currentBufferRadius = null;
            document.querySelectorAll('.buffer-btn').forEach(btn => btn.classList.remove('active'));
            drawBuffer(200);
            document.querySelector('.buffer-btn[data-radius="200"]').classList.add('active');
            document.getElementById('hoverDetails').innerHTML = `✅ Loaded ${amenities.length} amenities. Hover over icons.`;
        }

        // Event listeners
        document.getElementById('loadBtn').addEventListener('click', () => {
            const fileInput = document.getElementById('excelInput');
            if (!fileInput.files || fileInput.files.length === 0) {
                alert("Please select an Excel file first.");
                return;
            }
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    parseExcelAndMap(e.target.result);
                } catch (err) {
                    console.error(err);
                    alert("Error parsing file: " + err.message);
                }
            };
            reader.onerror = () => alert("Failed to read file");
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('resetViewBtn').addEventListener('click', () => {
            if (!map) return;
            map.setView(WRC_CENTER, 15.5);
            document.getElementById('filterTypeSelect').value = "all";
            if (amenitiesData.length) renderMap("all");
            if (currentBufferCircle) map.removeLayer(currentBufferCircle);
            currentBufferCircle = null;
            currentBufferRadius = null;
            document.querySelectorAll('.buffer-btn').forEach(b => b.classList.remove('active'));
        });

        document.querySelectorAll('.buffer-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const radius = parseInt(btn.getAttribute('data-radius'), 10);
                drawBuffer(radius);
                document.querySelectorAll('.buffer-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        document.getElementById('showNearbyBtn').addEventListener('click', () => {
            if (!currentBufferRadius) { alert("Please select a buffer radius first."); return; }
            if (!amenitiesData.length) { alert("Load an Excel file first."); return; }
            const nearby = amenitiesData.filter(item => item.distance <= currentBufferRadius);
            if (nearby.length === 0) alert(`No amenities within ${currentBufferRadius}m.`);
            else {
                const list = nearby.map(i => `✓ ${i.name} (${i.type}) - ${i.distance.toFixed(1)}m`).join('\n');
                alert(`🏆 ${nearby.length} amenities within ${currentBufferRadius}m:\n\n${list}`);
            }
        });

        document.getElementById('filterTypeSelect').addEventListener('change', (e) => {
            if (amenitiesData.length) renderMap(e.target.value);
        });

        initMap();
        document.getElementById('hoverDetails').innerHTML = `Upload your Excel file (outputexceltable.xls) to see representative icons.`;
    </script>
</body>
</html>
